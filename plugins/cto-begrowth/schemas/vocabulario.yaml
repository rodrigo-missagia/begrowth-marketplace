# ----------------------------------------------------------------------------
# ESTRUTURA ORGANIZACIONAL
# ----------------------------------------------------------------------------

empresas:
  - holding # Be Growth - compartilhado
  - utua # Arbitragem de tráfego + Publisher
  - resolve # Compra de créditos sucessórios
  - one-control # DMP + CDP + Engajamento
  - assiny # Checkout + Gateway + Subadquirência

# Para exibição em interfaces e relatórios
empresas_display:
  holding: "Be Growth (Holding)"
  utua: "UTUA"
  resolve: "RESOLVE"
  one-control: "ONE CONTROL"
  assiny: "ASSINY"

# ----------------------------------------------------------------------------
# PESSOAS
# ----------------------------------------------------------------------------

papeis_pessoa:
  # Liderança Executiva
  - cto
  - head

  # Liderança Técnica
  - tech_lead
  - tech_manager
  - arquiteto

  # Engenharia de Software
  - dev_senior
  - dev_pleno
  - dev_junior
  - fullstack # quando não há distinção back/front

  # Infraestrutura e Operações
  - sre
  - devops
  - security_engineer
  - observability_engineer

  # Dados
  - engenheiro_dados
  - analista_dados
  - ml_engineer
  - ai_engineer

  # Produto e Gestão
  - po # Product Owner
  - pm # Product Manager (se diferente de PO)
  - pmo
  - scrum_master

  # Processos e Negócio
  - analista_processos
  - analista_negocios

  # Especialistas de Domínio (Assiny)
  - especialista_pagamentos
  - especialista_antifraude
  - especialista_compliance # PCI-DSS, BACEN

  # Liderança de Negócio (não-tech)
  - lider_negocio
  - comercial
  - operacoes
  - suporte
  - cs

# Nível de senioridade (ortogonal ao papel)
niveis_skill:
  - junior
  - pleno
  - senior
  - especialista

# Nível de liderança (ortogonal ao papel e senioridade)
niveis_lideranca:
  - ic # Individual Contributor - sem reports
  - tech_lead # Lidera tecnicamente, pode ter reports
  - manager # Gestão de pessoas
  - head # Gestão de área
  - c_level # CTO, CEO, etc.

# Modelo de contratação
tipos_contrato:
  - clt
  - pj
  - freelancer
  - terceirizado
  - consultoria

# Alocação da pessoa
alocacao:
  - dedicado # 100% em uma empresa
  - compartilhado # Atende múltiplas empresas (holding)
  - parcial # % definido por empresa

# ----------------------------------------------------------------------------
# INICIATIVAS
# ----------------------------------------------------------------------------

status_iniciativa:
  - backlog # Ideia capturada, não priorizada
  - refinamento # Em detalhamento/discovery
  - pronto # Refinado, aguardando capacidade
  - em_andamento # Em execução ativa
  - bloqueado # Tem impedimento externo
  - pausado # Decisão deliberada de parar
  - concluido # Entregue
  - cancelado # Não será feito

tipo_iniciativa:
  - projeto # Tem início, meio e fim definidos
  - produto # Desenvolvimento contínuo de produto
  - capacidade # Aquisição de skill/ferramenta/conhecimento
  - melhoria # Evolução incremental
  - manutencao # Keep the lights on
  - debito_tecnica # Tech debt
  - exploracao # Spike, PoC, pesquisa
  - compliance # Regulatório obrigatório
  - infraestrutura # Infra, tooling, plataforma

prioridade:
  - critica # Drop everything - risco ao negócio
  - alta # Próximo a ser feito
  - media # Importante mas não urgente
  - baixa # Nice to have

# Papéis dentro de uma iniciativa (RACI simplificado)
papeis_iniciativa:
  - owner # Accountable - responsável final pelo resultado
  - executor # Responsible - quem executa o trabalho
  - contribuidor # Contribui ativamente em partes
  - sponsor # Patrocinador - aprova recursos/decisões
  - consultor # Consultado pontualmente (expertise)
  - informado # Apenas notificado de progresso

# Fase do ciclo de release (para iniciativas de software)
fase_release:
  - desenvolvimento # Em construção
  - dark_launch # Deploy sem exposição
  - closed_beta # Grupo restrito de usuários
  - open_beta # Disponível mas com disclaimer
  - ga # General Availability - produção
  - sunset # Em descontinuação

# ----------------------------------------------------------------------------
# DECISÕES DE ARQUITETURA (ADRs)
# ----------------------------------------------------------------------------

status_adr:
  - rascunho # Em elaboração
  - em_revisao # Aguardando feedback
  - proposta # Pronta para decisão
  - aceita # Decisão tomada, vigente
  - depreciada # Não mais recomendada (mas ainda válida para legado)
  - substituida # Substituída por outra ADR
  - rejeitada # Proposta não aceita

escopo_adr:
  - holding # Afeta todo o grupo
  - empresa # Afeta uma empresa específica
  - sistema # Afeta um sistema/serviço específico

categoria_adr:
  - arquitetura # Decisões de estrutura de sistema
  - tecnologia # Escolha de ferramentas/linguagens
  - processo # Decisões de processo/workflow
  - integracao # Como sistemas se comunicam
  - dados # Modelagem, storage, pipelines
  - seguranca # Decisões de security
  - infraestrutura # Cloud, deploy, observabilidade

# ----------------------------------------------------------------------------
# SAÚDE E SINALIZAÇÕES
# ----------------------------------------------------------------------------

health_status:
  - ok # Tudo bem, sem ação necessária
  - atencao # Requer monitoramento próximo
  - critico # Requer ação imediata

# Motivos comuns de health != ok (para tracking)
health_reasons:
  - prazo_risco # Risco de atraso
  - bloqueio_externo # Dependência externa não resolvida
  - capacidade # Falta de pessoas/skills
  - escopo_mudou # Mudança de escopo não planejada
  - tech_debt # Dívida técnica impactando
  - dependencia # Dependência interna atrasada
  - budget # Restrição orçamentária
  - prioridade # Conflito de prioridade
  - qualidade # Problemas de qualidade/bugs
  - indefinido # Motivo não especificado

